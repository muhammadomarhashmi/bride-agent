<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkFlex Bridge Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [contenteditable="true"]:focus { outline: 2px solid #0d9488; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto p-6">
    <header class="flex items-baseline justify-between mb-6">
      <div>
        <h1 class="text-2xl font-semibold">Bridge Agent</h1>
        <p class="text-sm text-slate-500">Turn Teams messages into Jira tickets.</p>
      </div>
      <div class="flex gap-2">
        <button id="processBtn"
                class="bg-teal-600 hover:bg-teal-700 text-white font-medium px-4 py-2 rounded-md disabled:opacity-50">
          Process Messages
        </button>
        <button id="submitBtn"
                class="bg-slate-900 hover:bg-black text-white font-medium px-4 py-2 rounded-md disabled:opacity-40"
                disabled>
          Submit Approved
        </button>
      </div>
    </header>

    <div id="status" class="text-sm text-slate-600 mb-4"></div>
    <div id="cards" class="space-y-3"></div>
    <div id="results" class="mt-6"></div>
  </div>

  <template id="cardTpl">
    <article class="bg-white border border-slate-200 rounded-lg p-4 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span data-f="action-badge" class="text-xs font-semibold uppercase px-2 py-1 rounded"></span>
          <span data-f="target" class="text-sm font-mono text-slate-500"></span>
        </div>
        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" data-f="approve" class="w-4 h-4 accent-teal-600" checked>
          Approve
        </label>
      </div>
      <div class="text-sm text-slate-600 mb-2">
        <span data-f="requester" class="font-medium"></span>
        <span>→</span>
        <span data-f="client"></span>
        <span data-f="arr" class="text-slate-500"></span>
      </div>
      <div class="mb-1 text-xs uppercase tracking-wide text-slate-400" data-f="title-label"></div>
      <div data-f="title" contenteditable="true" class="font-medium mb-2"></div>
      <div class="mb-1 text-xs uppercase tracking-wide text-slate-400" data-f="body-label"></div>
      <div data-f="body" contenteditable="true"
           class="whitespace-pre-wrap text-sm bg-slate-50 border border-slate-200 rounded p-3 min-h-[4rem]"></div>
      <div class="text-xs text-slate-400 mt-2" data-f="reasoning"></div>
      <div class="text-xs text-red-600 mt-1 hidden" data-f="error"></div>
    </article>
  </template>

  <script>
    const $ = (sel, root = document) => root.querySelector(sel);
    const statusEl = $("#status");
    const cardsEl = $("#cards");
    const processBtn = $("#processBtn");
    const submitBtn = $("#submitBtn");
    const resultsEl = $("#results");

    let drafts = [];

    const ACTION_STYLES = {
      create:  "bg-emerald-100 text-emerald-800",
      comment: "bg-sky-100 text-sky-800",
      skip:    "bg-slate-100 text-slate-600",
    };

    function fmtArr(n) {
      if (n == null) return "";
      return " • $" + Number(n).toLocaleString() + " ARR";
    }

    function render() {
      cardsEl.innerHTML = "";
      const tpl = $("#cardTpl");
      drafts.forEach((d, idx) => {
        const node = tpl.content.firstElementChild.cloneNode(true);
        const f = name => node.querySelector(`[data-f="${name}"]`);
        const action = d.decision.action;
        f("action-badge").textContent = action;
        f("action-badge").className = "text-xs font-semibold uppercase px-2 py-1 rounded " + (ACTION_STYLES[action] || "");
        f("target").textContent = action === "comment" ? (d.decision.target_ticket_key || "") : "";
        f("requester").textContent = d.source.requester || "unknown";
        f("client").textContent = d.source.matched_client_name || d.source.raw_client_name || "unknown client";
        f("arr").textContent = fmtArr(d.source.arr_usd);
        f("reasoning").textContent = d.decision.reasoning || "";
        if (d.error) { f("error").textContent = d.error; f("error").classList.remove("hidden"); }

        if (action === "create") {
          f("title-label").textContent = "Title";
          f("title").textContent = d.decision.title || "";
          f("body-label").textContent = "Summary (markdown)";
          f("body").textContent = d.decision.summary || "";
        } else if (action === "comment") {
          f("title-label").textContent = "Commenting on";
          f("title").textContent = d.decision.target_ticket_key || "";
          f("title").contentEditable = "false";
          f("body-label").textContent = "Comment body";
          f("body").textContent = d.decision.comment_body || "";
        } else {
          f("title-label").textContent = "Skipped";
          f("title").textContent = d.source.core_request || "";
          f("title").contentEditable = "false";
          f("body-label").textContent = "";
          f("body").textContent = "";
          f("approve").checked = false;
          f("approve").disabled = true;
        }

        const sync = () => {
          if (action === "create") {
            d.decision.title = f("title").textContent.trim();
            d.decision.summary = f("body").textContent;
          } else if (action === "comment") {
            d.decision.comment_body = f("body").textContent;
          }
          d._approved = f("approve").checked;
        };
        node.addEventListener("input", sync);
        node.addEventListener("change", sync);
        d._approved = action !== "skip";

        cardsEl.appendChild(node);
      });
      submitBtn.disabled = drafts.every(d => !d._approved);
    }

    async function process() {
      processBtn.disabled = true;
      submitBtn.disabled = true;
      statusEl.textContent = "Fetching Teams messages and drafting tickets… (can take ~30-60s)";
      resultsEl.innerHTML = "";
      try {
        const r = await fetch("/api/process", { method: "POST" });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        drafts = data.drafts;
        statusEl.textContent = `Drafted ${drafts.length} item(s). Review and submit.`;
        render();
      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
      } finally {
        processBtn.disabled = false;
      }
    }

    async function submitApproved() {
      const approved = drafts.filter(d => d._approved);
      if (!approved.length) return;
      submitBtn.disabled = true;
      statusEl.textContent = `Submitting ${approved.length} draft(s)…`;
      try {
        const r = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ drafts: approved }),
        });
        if (!r.ok) throw new Error(await r.text());
        const { results } = await r.json();
        const ok = results.filter(r => r.status === "submitted").length;
        statusEl.textContent = `Submitted: ${ok}/${results.length} succeeded.`;
        resultsEl.innerHTML = `
          <h2 class="text-sm font-semibold text-slate-700 mb-2">Submission results</h2>
          <ul class="text-sm space-y-1">` +
          results.map(r => `
            <li class="font-mono">
              <span class="${r.status === 'submitted' ? 'text-emerald-700' : r.status === 'error' ? 'text-red-600' : 'text-slate-500'}">
                ${r.status}
              </span>
              ${r.jira_key ? ' — ' + r.jira_key : ''}
              ${r.teams_message_id ? ' • teams:' + r.teams_message_id : ''}
              ${r.detail ? ' — ' + r.detail.slice(0, 140) : ''}
            </li>`).join("") + `</ul>`;
      } catch (e) {
        statusEl.textContent = "Submit failed: " + e.message;
      } finally {
        submitBtn.disabled = false;
      }
    }

    processBtn.addEventListener("click", process);
    submitBtn.addEventListener("click", submitApproved);
  </script>
</body>
</html>
